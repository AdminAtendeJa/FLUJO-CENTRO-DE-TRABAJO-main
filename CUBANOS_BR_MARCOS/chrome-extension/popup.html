<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; width: 320px; padding: 16px; background: #0f172a; color: #f8fafc; margin: 0; }
    h2 { font-size: 16px; margin-top: 0; color: #38bdf8; display: flex; align-items: center; gap: 8px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 8px; margin-bottom: 12px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 8px; background: #38bdf8; color: #0f172a; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
    button:hover { background: #0ea5e9; }
    .client-item { padding: 8px; background: #1e293b; border-radius: 4px; margin-bottom: 8px; cursor: pointer; border: 1px solid #334155; }
    .client-item:hover { border-color: #38bdf8; }
    .client-name { font-weight: bold; font-size: 14px; }
    .client-cpf { font-size: 12px; color: #94a3b8; }
    #configSection { display: none; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #334155; }
    .settings-btn { background: transparent; color: #94a3b8; font-size: 12px; text-align: right; width: auto; padding: 0; margin-bottom: 0; }
    .settings-btn:hover { background: transparent; color: white; }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h2 style="margin: 0;">Cubanos BR Auto-Fill</h2>
    <button id="toggleConfig" class="settings-btn">⚙️ Config</button>
  </div>

  <div id="configSection">
    <label style="font-size: 12px; color: #94a3b8;">Supabase URL</label>
    <input type="text" id="supaUrl" placeholder="https://xxx.supabase.co">
    <label style="font-size: 12px; color: #94a3b8;">Supabase Key</label>
    <input type="password" id="supaKey" placeholder="ey...">
    <button id="saveConfig">Guardar Configuración</button>
  </div>

  <div id="activeClientSection" style="display: none; background: rgba(56, 189, 248, 0.1); border: 1px solid #38bdf8; padding: 12px; border-radius: 6px; margin-bottom: 16px;">
    <div style="font-size: 11px; color: #38bdf8; text-transform: uppercase; font-weight: bold; margin-bottom: 4px;">Cliente Activo (Sincronizado)</div>
    <div id="activeClientName" style="font-weight: bold; font-size: 14px; margin-bottom: 8px;"></div>
    <button id="btnAutoFillActive" style="background: #38bdf8; color: #0f172a; margin-bottom: 0;">Rellenar en esta página</button>
  </div>

  <div id="searchSection">
    <input type="text" id="searchInput" placeholder="Buscar cliente por nombre o CPF...">
    <div id="loading" style="display: none; text-align: center; color: #94a3b8; font-size: 12px; margin: 8px 0;">Buscando...</div>
    <div id="resultsList"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
