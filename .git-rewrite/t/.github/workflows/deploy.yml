name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -rf /tmp/repo
            git clone https://github.com/AdminAtendeJa/FLUJO-CENTRO-DE-TRABAJO.git /tmp/repo
            cp -r /tmp/repo/CUBANOS_BR_MARCOS/DASHBOARD/* /var/www/dashboard/
            rm -rf /tmp/repo
